<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASOBooN スタンプラリー</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #fff8e8, #ffe1a8);
      color: #2f2518;
    }
    .card {
      width: min(88vw, 420px);
      padding: 28px 22px;
      border-radius: 28px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 16px 44px rgba(91, 54, 0, .14);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      line-height: 1.15;
    }
    p {
      margin: 0;
      color: #7b6a55;
      font-weight: 700;
      line-height: 1.7;
    }
    .ok {
      margin-top: 18px;
      padding: 12px;
      border-radius: 18px;
      background: #fff1cc;
      color: #c46c00;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>ASOBooN<br>スタンプラリー</h1>
    <p>GitHub Pages 表示テスト中です。</p>
    <div class="ok">ここが見えたら成功です</div>
  </main>
</body>
</html>
