<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>ASOBooN おみくじ</title>
  <style>
    :root{
      --shrine-red:#c1272d;
      --shrine-red-dark:#7a0e16;
      --shrine-red-deep:#4d0309;
      --shrine-gold:#f3c537;
      --shrine-gold-light:#ffe8a3;
      --shrine-gold-deep:#a87412;
      --shrine-ink:#1a0405;
      --paper-cream:#fff5dc;
      --paper-aged:#e8d5a0;
      --metal-brass:#c89a3c;
      --metal-dark:#2a1612;
      --metal-darker:#150709;

      --r-dai:#ff5f1f;
      --r-kichi:#ff9d3c;
      --r-chu:#5fa8ff;
      --r-sho:#67c384;
      --r-sue:#9aa5b0;

      --shadow:0 22px 60px rgba(0,0,0,.42);
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; min-height:100%; -webkit-text-size-adjust:100%; }
    body{
      min-height:100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      color:#fff7e8;
      background:
        radial-gradient(circle at 50% 0%, rgba(243,197,55,.22), transparent 32%),
        radial-gradient(circle at 50% 80%, rgba(193,39,45,.18), transparent 36%),
        linear-gradient(180deg, #2c0a0d 0%, #1a0405 50%, #0a0203 100%);
      overflow-x:hidden;
    }

    /* Subtle "fabric" / shrine paper texture overlay */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 3px),
        repeating-linear-gradient(90deg, rgba(0,0,0,.18) 0 1px, transparent 1px 48px);
      opacity:.7;
      z-index:0;
    }

    /* Floating gold motes (atmospheric) */
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(rgba(243,197,55,.28) 1px, transparent 1.5px),
        radial-gradient(rgba(255,255,255,.22) 1px, transparent 1.5px);
      background-size: 90px 90px, 130px 130px;
      background-position: 0 0, 45px 65px;
      opacity:.5;
      animation: motesDrift 24s linear infinite;
      z-index:0;
    }

    @keyframes motesDrift {
      from { background-position: 0 0, 45px 65px; }
      to { background-position: 90px -90px, 135px -25px; }
    }

    .app{
      position:relative;
      z-index:1;
      width:min(100%, 560px);
      margin:0 auto;
      min-height:100vh;
      padding:max(18px, env(safe-area-inset-top) + 10px) 12px max(18px, env(safe-area-inset-bottom) + 10px);
    }

    /* === SHELL — shrine roof + mecha case === */
    .shell{
      position:relative;
      min-height:calc(100vh - 30px);
      padding:14px;
      border-radius:34px;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.1)),
        linear-gradient(180deg, #4a1015 0%, #28080a 50%, #100204 100%);
      border:2px solid rgba(243,197,55,.32);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.12),
        inset 0 -4px 0 rgba(0,0,0,.4),
        inset 0 0 0 1px rgba(243,197,55,.16),
        0 24px 70px rgba(0,0,0,.6);
    }

    /* Shrine roof / kaerumata silhouette (top arch) */
    .shell::before{
      content:"";
      position:absolute;
      left:-8%;
      right:-8%;
      top:-20px;
      height:54px;
      background:
        linear-gradient(180deg, #c1272d 0%, #7a0e16 100%);
      clip-path: polygon(
        0 100%, 0 60%,
        6% 50%, 12% 38%, 22% 28%, 32% 22%,
        50% 18%, 68% 22%, 78% 28%, 88% 38%, 94% 50%, 100% 60%, 100% 100%
      );
      z-index:1;
      box-shadow: 0 4px 14px rgba(0,0,0,.5);
    }

    .shell::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      top:32px;
      height:8px;
      background:
        repeating-linear-gradient(90deg,
          var(--shrine-gold) 0 22px,
          var(--shrine-gold-deep) 22px 23px,
          var(--shrine-gold) 23px 45px,
          var(--metal-dark) 45px 47px);
      box-shadow: 0 3px 8px rgba(0,0,0,.45);
      z-index:1;
    }

    .content{
      position:relative;
      z-index:2;
      padding-top:30px;
    }

    /* === TOP BAR === */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:6px 2px 10px;
    }

    .round-btn{
      width:44px;
      height:44px;
      border-radius:50%;
      display:grid;
      place-items:center;
      text-decoration:none;
      color:var(--shrine-gold);
      font-size:22px;
      font-weight:900;
      background:
        linear-gradient(180deg, #5a1418 0%, #28080a 100%);
      border:2px solid rgba(243,197,55,.4);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.16),
        inset 0 -2px 0 rgba(0,0,0,.4),
        0 8px 18px rgba(0,0,0,.5),
        0 0 14px rgba(243,197,55,.18);
      flex:0 0 auto;
      -webkit-tap-highlight-color:transparent;
    }

    .brand{
      min-width:0;
      flex:1 1 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      white-space:nowrap;
      color:var(--shrine-gold);
      font-size:24px;
      font-weight:950;
      letter-spacing:.05em;
      text-shadow:
        0 2px 0 rgba(0,0,0,.7),
        0 0 14px rgba(243,197,55,.35);
    }

    .gear-decor{
      display:grid;
      place-items:center;
      width:22px;
      height:22px;
      border-radius:50%;
      font-size:13px;
      color:#fff5d0;
      background:
        radial-gradient(circle at 50% 50%, var(--shrine-gold) 0 50%, var(--shrine-gold-deep) 100%);
      border:1px solid rgba(0,0,0,.4);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.4),
        0 3px 8px rgba(0,0,0,.4);
    }

    /* === TITLE — wooden plaque (扁額) === */
    .title-plaque{
      position:relative;
      margin:0 28px 14px;
      padding:16px 18px 18px;
      text-align:center;
      border-radius:6px;
      background:
        linear-gradient(180deg, rgba(0,0,0,.16), transparent 30%),
        linear-gradient(180deg, #2c0608 0%, #160203 100%);
      border:3px solid var(--shrine-gold);
      box-shadow:
        inset 0 0 0 1px var(--shrine-ink),
        inset 0 0 16px rgba(0,0,0,.7),
        0 10px 22px rgba(0,0,0,.5),
        0 0 22px rgba(243,197,55,.18);
    }

    /* Decorative shrine corner ornaments */
    .title-plaque::before,
    .title-plaque::after{
      content:"";
      position:absolute;
      top:-12px;
      width:20px;
      height:20px;
      background:
        radial-gradient(circle at 50% 50%, var(--shrine-gold) 0 60%, var(--shrine-gold-deep) 100%);
      border-radius:50%;
      border:2px solid var(--shrine-ink);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.5),
        0 3px 6px rgba(0,0,0,.6);
    }

    .title-plaque::before{ left:-12px; }
    .title-plaque::after{ right:-12px; }

    .title-plaque h1{
      margin:0;
      font-size:clamp(34px, 9vw, 46px);
      line-height:1;
      font-weight:950;
      letter-spacing:.16em;
      color:transparent;
      background: linear-gradient(180deg,
        #fff5dc 0%,
        #ffd34a 25%,
        #c89a3c 50%,
        #ffd34a 75%,
        #a87412 100%);
      -webkit-background-clip:text;
      background-clip:text;
      filter:
        drop-shadow(0 2px 0 rgba(0,0,0,.6))
        drop-shadow(0 0 12px rgba(243,197,55,.35));
    }

    .title-subline{
      margin:8px 0 0;
      color:var(--shrine-gold-light);
      font-size:11px;
      font-weight:900;
      letter-spacing:.32em;
      opacity:.85;
    }

    /* === MAIN PANEL === */
    .main-panel{
      position:relative;
      border-radius:24px;
      padding:14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.18)),
        linear-gradient(180deg, #2a0a0d 0%, #14040a 100%);
      border:2px solid rgba(243,197,55,.28);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.08),
        inset 0 -3px 0 rgba(0,0,0,.4),
        0 18px 40px rgba(0,0,0,.5);
    }

    .main-panel::before{
      content:"";
      position:absolute;
      inset:6px;
      border-radius:18px;
      pointer-events:none;
      border:1px dashed rgba(243,197,55,.18);
    }

    /* === GASHAPON MACHINE === */
    .gashapon{
      position:relative;
      margin:6px 0 12px;
      padding:0;
      border-radius:20px;
      overflow:hidden;
    }

    /* Top sign panel — ASOBooN みくじ社 */
    .gasha-sign{
      position:relative;
      margin:0 8px 0;
      padding:10px 14px 12px;
      border-radius:14px 14px 0 0;
      text-align:center;
      background:
        linear-gradient(180deg, #ffe18a 0%, #c89a3c 50%, #7d5510 100%);
      border:2px solid var(--shrine-ink);
      border-bottom:0;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.5),
        inset 0 -3px 0 rgba(0,0,0,.34);
      z-index:3;
    }

    .gasha-sign::before,
    .gasha-sign::after{
      content:"";
      position:absolute;
      top:6px;
      width:14px;
      height:14px;
      border-radius:50%;
      background:radial-gradient(circle, #fff5d0 0 30%, var(--shrine-gold) 32% 60%, var(--shrine-gold-deep) 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.6), 0 0 8px rgba(243,197,55,.5);
      animation: signLightBlink 1.1s steps(2, end) infinite;
    }

    .gasha-sign::before{ left:8px; }
    .gasha-sign::after{ right:8px; animation-delay: .55s; }

    @keyframes signLightBlink {
      0%, 49% { opacity: .35; transform: scale(.9); }
      50%, 100% { opacity: 1; transform: scale(1.1); }
    }

    .gasha-sign-tag{
      display:block;
      margin:0 0 4px;
      color:var(--shrine-red-dark);
      font-size:10px;
      font-weight:950;
      letter-spacing:.32em;
    }

    .gasha-sign-name{
      display:block;
      margin:0;
      color:var(--shrine-ink);
      font-size:clamp(20px, 5.5vw, 26px);
      line-height:1;
      font-weight:950;
      letter-spacing:.12em;
      text-shadow: 0 1px 0 rgba(255,255,255,.5);
    }

    /* Hanging shrine bell rope above the dome */
    .gasha-rope{
      position:absolute;
      left:50%;
      top:0;
      transform:translateX(-50%);
      width:40px;
      height:34px;
      pointer-events:none;
      z-index:4;
    }

    .gasha-rope::before{
      content:"";
      position:absolute;
      left:50%;
      top:0;
      width:6px;
      height:24px;
      transform:translateX(-50%);
      background: repeating-linear-gradient(
        180deg,
        #fff5dc 0 3px,
        #d6c195 3px 4px,
        #fff5dc 4px 7px,
        #a89060 7px 8px
      );
      border-radius:3px;
      box-shadow: 0 1px 0 rgba(0,0,0,.4);
    }

    .gasha-rope::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-2px;
      transform:translateX(-50%);
      width:18px;
      height:18px;
      border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff5d0 0 18%, var(--shrine-gold) 22% 60%, var(--shrine-gold-deep) 100%);
      border:1.5px solid var(--shrine-ink);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.5),
        0 3px 6px rgba(0,0,0,.45),
        0 0 8px rgba(243,197,55,.3);
    }

    /* Dome — capsule reservoir */
    .gasha-dome{
      position:relative;
      height:200px;
      margin:0 8px;
      border-radius:0 0 0 0;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(255,255,255,.20), transparent 60%),
        linear-gradient(180deg, rgba(255,245,220,.18) 0%, rgba(243,197,55,.10) 100%);
      border-left:3px solid var(--shrine-ink);
      border-right:3px solid var(--shrine-ink);
      overflow:hidden;
      box-shadow:
        inset 0 0 0 1px rgba(243,197,55,.4),
        inset 0 0 30px rgba(0,0,0,.5),
        inset 0 -8px 12px rgba(0,0,0,.6);
    }

    /* Glass reflections */
    .gasha-dome::before{
      content:"";
      position:absolute;
      left:8%;
      top:6%;
      width:30%;
      height:55%;
      background: linear-gradient(135deg, rgba(255,255,255,.4), transparent 60%);
      border-radius:50%;
      filter: blur(6px);
      pointer-events:none;
    }

    .gasha-dome::after{
      content:"";
      position:absolute;
      right:12%;
      bottom:10%;
      width:18%;
      height:32%;
      background: linear-gradient(135deg, rgba(255,255,255,.18), transparent 60%);
      border-radius:50%;
      filter: blur(4px);
      pointer-events:none;
    }

    /* Capsules floating in the reservoir */
    .gasha-capsules{
      position:absolute;
      inset:0;
      overflow:hidden;
      pointer-events:none;
    }

    .reservoir-capsule{
      position:absolute;
      width:32px;
      height:32px;
      border-radius:50%;
      animation: capsuleFloat 6s ease-in-out infinite;
    }

    .reservoir-capsule::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.7), transparent 35%),
        var(--cap-color);
      border:1.5px solid rgba(0,0,0,.4);
      box-shadow: inset 0 -3px 5px rgba(0,0,0,.3), 0 2px 4px rgba(0,0,0,.3);
    }

    .reservoir-capsule::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      top:48%;
      height:4px;
      background: linear-gradient(180deg, rgba(0,0,0,.4), rgba(255,255,255,.15));
      border-top:1px solid rgba(0,0,0,.5);
      border-bottom:1px solid rgba(255,255,255,.3);
    }

    .reservoir-capsule.cap-red { --cap-color: linear-gradient(180deg, #ff7e3a, #c1272d); top:14%; left:10%; animation-delay: 0s; }
    .reservoir-capsule.cap-gold { --cap-color: linear-gradient(180deg, #ffe88a, #c89a3c); top:32%; left:62%; animation-delay: 1.5s; width:36px; height:36px; }
    .reservoir-capsule.cap-blue { --cap-color: linear-gradient(180deg, #92d4ff, #266cd6); top:54%; left:18%; animation-delay: 3s; width:28px; height:28px; }
    .reservoir-capsule.cap-green { --cap-color: linear-gradient(180deg, #a4ddb1, #2f8d50); top:24%; left:38%; animation-delay: 2s; width:30px; height:30px; }
    .reservoir-capsule.cap-red2 { --cap-color: linear-gradient(180deg, #ff9d3c, #b1391b); top:62%; left:54%; animation-delay: 4.5s; width:34px; height:34px; }
    .reservoir-capsule.cap-gold2 { --cap-color: linear-gradient(180deg, #fff5cc, #d6a124); top:46%; left:76%; animation-delay: 2.8s; width:30px; height:30px; }
    .reservoir-capsule.cap-purple { --cap-color: linear-gradient(180deg, #d2a3ff, #6b2bc1); top:70%; left:30%; animation-delay: 5s; width:28px; height:28px; }
    .reservoir-capsule.cap-pink { --cap-color: linear-gradient(180deg, #ffb1c8, #d63a72); top:18%; left:78%; animation-delay: 1s; width:30px; height:30px; }

    @keyframes capsuleFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(4px, -6px) rotate(8deg); }
      50% { transform: translate(-3px, 4px) rotate(-5deg); }
      75% { transform: translate(5px, 6px) rotate(12deg); }
    }

    /* Body — mecha frame */
    .gasha-body{
      position:relative;
      margin:0 8px 0;
      padding:14px 14px 16px;
      background:
        linear-gradient(180deg, #c1272d 0%, #7a0e16 100%);
      border:3px solid var(--shrine-ink);
      border-top:0;
      box-shadow:
        inset 0 0 0 1px rgba(243,197,55,.3),
        inset 0 -4px 0 rgba(0,0,0,.5);
    }

    /* Brass band across body */
    .gasha-body::before{
      content:"";
      position:absolute;
      left:0;
      right:0;
      top:0;
      height:8px;
      background: repeating-linear-gradient(
        90deg,
        var(--shrine-gold) 0 18px,
        var(--shrine-gold-deep) 18px 19px,
        var(--shrine-gold) 19px 36px,
        var(--metal-dark) 36px 38px
      );
      box-shadow: 0 2px 4px rgba(0,0,0,.4);
    }

    /* Capsule slot/window */
    .gasha-window{
      position:relative;
      margin:8px 0 12px;
      height:96px;
      border-radius:14px;
      background:
        linear-gradient(180deg, rgba(0,0,0,.5), rgba(0,0,0,.85)),
        radial-gradient(circle at 50% 50%, rgba(243,197,55,.18), transparent 60%);
      border:3px solid var(--metal-dark);
      box-shadow:
        inset 0 0 0 2px var(--shrine-gold),
        inset 0 0 18px rgba(0,0,0,.8),
        0 4px 8px rgba(0,0,0,.4);
      overflow:hidden;
    }

    /* Window scan line */
    .gasha-window::before{
      content:"";
      position:absolute;
      left:0; right:0;
      top:0; bottom:0;
      background:
        repeating-linear-gradient(0deg,
          rgba(255,255,255,.05) 0 1px,
          transparent 1px 3px);
      pointer-events:none;
    }

    .gasha-window-display{
      position:relative;
      z-index:2;
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
      text-align:center;
    }

    .display-rank{
      font-size:34px;
      font-weight:950;
      line-height:1;
      letter-spacing:.16em;
      color:var(--shrine-gold);
      text-shadow:
        0 0 12px rgba(243,197,55,.7),
        0 2px 0 rgba(0,0,0,.8);
      transition: color .2s ease, text-shadow .2s ease;
    }

    .display-type{
      margin-top:6px;
      font-size:11px;
      font-weight:900;
      letter-spacing:.22em;
      color:var(--shrine-gold-light);
      opacity:.85;
    }

    .display-rank.idle{
      color:var(--shrine-gold-light);
      font-size:22px;
      letter-spacing:.18em;
      text-shadow: 0 0 8px rgba(243,197,55,.4);
    }

    /* Drawing-state shake */
    .gashapon.drawing .gasha-body{
      animation: gashaShake .14s linear infinite;
    }

    @keyframes gashaShake {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-1.5px, .5px); }
      50% { transform: translate(1.5px, -.5px); }
      75% { transform: translate(-.5px, 1px); }
    }

    .gashapon.drawing .display-rank{
      animation: rankFlicker .08s steps(2, end) infinite;
    }

    @keyframes rankFlicker {
      0% { color: var(--shrine-gold); }
      50% { color: #ff7e3a; }
      100% { color: #5fa8ff; }
    }

    /* Knob/handle */
    .gasha-knob-row{
      display:grid;
      grid-template-columns: 1fr 76px;
      gap:14px;
      align-items:center;
    }

    .gasha-coin-slot{
      height:48px;
      border-radius:10px;
      background:
        linear-gradient(180deg, rgba(0,0,0,.5), rgba(0,0,0,.85));
      border:2px solid var(--metal-dark);
      box-shadow:
        inset 0 0 0 1px var(--shrine-gold),
        inset 0 4px 6px rgba(0,0,0,.7);
      position:relative;
      overflow:hidden;
    }

    .gasha-coin-slot::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      width:60%;
      height:5px;
      border-radius:3px;
      background:
        linear-gradient(180deg, var(--metal-darker) 0%, #000 100%);
      box-shadow: inset 0 1px 2px rgba(0,0,0,.9);
    }

    .gasha-coin-slot::after{
      content:"COIN ▼";
      position:absolute;
      left:0; right:0;
      bottom:4px;
      text-align:center;
      color: var(--shrine-gold);
      font-size:9px;
      font-weight:900;
      letter-spacing:.22em;
      opacity:.7;
    }

    .gasha-knob{
      position:relative;
      width:76px;
      height:76px;
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 30%, #fff5dc 0 12%, var(--shrine-gold) 18%, var(--shrine-gold-deep) 75%, #5a3608 100%);
      border:3px solid var(--shrine-ink);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.5),
        inset 0 -3px 0 rgba(0,0,0,.4),
        0 6px 12px rgba(0,0,0,.5),
        0 0 20px rgba(243,197,55,.25);
      display:grid;
      place-items:center;
      cursor:pointer;
      transition: transform .3s cubic-bezier(.5,0,.2,1);
      -webkit-tap-highlight-color: transparent;
    }

    .gasha-knob::before{
      content:"";
      position:absolute;
      inset:6px;
      border-radius:50%;
      border:2px dashed var(--shrine-ink);
      opacity:.4;
    }

    .gasha-knob-inner{
      position:relative;
      width:32px;
      height:32px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, #fff5dc 0 18%, var(--shrine-gold) 60%, var(--shrine-gold-deep) 100%);
      border:2px solid var(--shrine-ink);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.5), 0 2px 4px rgba(0,0,0,.4);
    }

    .gasha-knob-inner::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:14px;
      height:3px;
      transform:translate(-50%, -50%);
      background:var(--shrine-ink);
      border-radius:2px;
    }

    .gasha-knob-inner::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:3px;
      height:14px;
      transform:translate(-50%, -50%);
      background:var(--shrine-ink);
      border-radius:2px;
    }

    .gashapon.drawing .gasha-knob{
      animation: knobSpin .35s linear infinite;
    }

    @keyframes knobSpin {
      to { transform: rotate(360deg); }
    }

    /* Capsule output tray */
    .gasha-tray{
      position:relative;
      margin:14px 8px 0;
      padding:14px 14px 18px;
      border-radius: 0 0 18px 18px;
      background:
        linear-gradient(180deg, #2a1612 0%, #150709 100%);
      border:3px solid var(--shrine-ink);
      border-top:0;
      box-shadow:
        inset 0 2px 0 rgba(243,197,55,.18),
        inset 0 -3px 0 rgba(0,0,0,.5);
      min-height:80px;
      display:grid;
      place-items:center;
    }

    .gasha-tray::before{
      content:"取り出し口";
      position:absolute;
      left:14px;
      top:6px;
      font-size:9px;
      font-weight:900;
      letter-spacing:.18em;
      color: var(--shrine-gold);
      opacity:.6;
    }

    .gasha-tray-empty{
      color: rgba(255,255,255,.32);
      font-size:12px;
      font-weight:800;
      letter-spacing:.12em;
    }

    /* === ACTION ROW === */
    .action-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
    }

    .btn{
      width:100%;
      min-height:54px;
      border:0;
      border-radius:18px;
      padding:12px 14px;
      text-align:center;
      text-decoration:none;
      cursor:pointer;
      font-size:16px;
      font-weight:950;
      letter-spacing:.04em;
      display:grid;
      place-items:center;
      transition:transform .16s ease, filter .16s ease, opacity .16s ease;
      -webkit-tap-highlight-color:transparent;
    }

    .btn:active{ transform:translateY(1px) scale(.992); }

    .btn-primary{
      color:#1a0405;
      background:
        linear-gradient(180deg, #fff5cc 0%, var(--shrine-gold) 45%, var(--shrine-gold-deep) 100%);
      border:2px solid var(--shrine-ink);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.55),
        inset 0 -3px 0 rgba(0,0,0,.24),
        0 10px 18px rgba(0,0,0,.34),
        0 0 24px rgba(243,197,55,.28);
    }

    .btn-primary.shine{
      animation: btnShine 1.4s ease-in-out infinite alternate;
    }

    @keyframes btnShine {
      from { filter: brightness(1); box-shadow:
        inset 0 2px 0 rgba(255,255,255,.55),
        inset 0 -3px 0 rgba(0,0,0,.24),
        0 10px 18px rgba(0,0,0,.34),
        0 0 24px rgba(243,197,55,.28); }
      to { filter: brightness(1.1); box-shadow:
        inset 0 2px 0 rgba(255,255,255,.55),
        inset 0 -3px 0 rgba(0,0,0,.24),
        0 10px 18px rgba(0,0,0,.34),
        0 0 36px rgba(243,197,55,.55); }
    }

    .btn-sub{
      color:#fff2d6;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.18)),
        linear-gradient(180deg, #4a1015, #20080a);
      border:2px solid rgba(243,197,55,.32);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.10),
        0 10px 18px rgba(0,0,0,.34);
    }

    .btn[disabled]{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      animation:none;
    }

    /* === FULLSCREEN DRAW OVERLAY === */
    .draw-overlay{
      position:fixed;
      inset:0;
      z-index:60;
      display:none;
      place-items:center;
      padding:18px;
      background:
        radial-gradient(circle at 50% 40%, rgba(193,39,45,.32), transparent 32%),
        radial-gradient(circle at 50% 80%, rgba(243,197,55,.18), transparent 32%),
        rgba(8,2,4,.85);
      backdrop-filter: blur(8px) saturate(1.2);
      pointer-events:none;
    }

    .draw-overlay.show{
      display:grid;
      animation: overlayFade .5s ease both;
    }

    @keyframes overlayFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Sliding torii gate that splits open */
    .torii{
      position:absolute;
      left:0;
      right:0;
      top:0;
      bottom:0;
      pointer-events:none;
    }

    .torii-pillar{
      position:absolute;
      top:0;
      bottom:0;
      width:36px;
      background:
        linear-gradient(180deg, #ff5028 0%, var(--shrine-red) 30%, var(--shrine-red-dark) 70%, var(--shrine-red-deep) 100%);
      border:2px solid var(--shrine-ink);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.16),
        inset 0 -3px 0 rgba(0,0,0,.4),
        0 0 30px rgba(193,39,45,.5);
    }

    .torii-pillar.left{ left:50%; transform:translateX(-100%); }
    .torii-pillar.right{ left:50%; }

    .torii-pillar::before{
      content:"";
      position:absolute;
      left:-8px;
      right:-8px;
      top:14%;
      height:14px;
      background: var(--shrine-gold);
      border:2px solid var(--shrine-ink);
      border-radius:2px;
      box-shadow: 0 2px 4px rgba(0,0,0,.4);
    }

    .torii-top{
      position:absolute;
      left:50%;
      top:0;
      transform:translateX(-50%);
      width:80%;
      max-width:540px;
      height:64px;
      background:
        linear-gradient(180deg, #ff5028 0%, var(--shrine-red) 30%, var(--shrine-red-dark) 70%, var(--shrine-red-deep) 100%);
      border:2px solid var(--shrine-ink);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.16),
        inset 0 -3px 0 rgba(0,0,0,.4),
        0 4px 14px rgba(0,0,0,.6),
        0 0 36px rgba(193,39,45,.55);
      clip-path: polygon(
        0 60%, 4% 40%,
        50% 0,
        96% 40%, 100% 60%,
        100% 100%, 0 100%
      );
    }

    .draw-overlay.show .torii-pillar.left{
      animation: toriiSplitLeft 1s cubic-bezier(.6,.05,.2,1) 1.6s forwards;
    }

    .draw-overlay.show .torii-pillar.right{
      animation: toriiSplitRight 1s cubic-bezier(.6,.05,.2,1) 1.6s forwards;
    }

    @keyframes toriiSplitLeft {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(-220%); opacity: .6; }
    }

    @keyframes toriiSplitRight {
      0% { transform: translateX(0); }
      100% { transform: translateX(120%); opacity: .6; }
    }

    .draw-overlay.show .torii-top{
      animation: toriiTopRise 1.2s cubic-bezier(.6,.05,.2,1) 1.6s forwards;
    }

    @keyframes toriiTopRise {
      0% { transform: translateX(-50%) translateY(0); opacity: 1; }
      100% { transform: translateX(-50%) translateY(-100%); opacity: 0; }
    }

    /* Shimenawa rope across center */
    .shimenawa{
      position:absolute;
      left:0; right:0;
      top:24%;
      height:36px;
      pointer-events:none;
      z-index:3;
    }

    .shimenawa-rope{
      position:absolute;
      left:8%; right:8%;
      top:50%;
      height:18px;
      transform:translateY(-50%);
      background:
        repeating-linear-gradient(
          92deg,
          #fff5dc 0 22px,
          #d6c195 22px 24px,
          #fff5dc 24px 46px,
          #a89060 46px 48px
        );
      border-radius:9px;
      border:1.5px solid rgba(0,0,0,.4);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.5),
        0 4px 8px rgba(0,0,0,.5);
    }

    .shimenawa-shide{
      position:absolute;
      width:10px;
      height:32px;
      background:#fff;
      box-shadow: 0 2px 4px rgba(0,0,0,.3);
      clip-path: polygon(50% 0, 100% 28%, 50% 50%, 100% 75%, 50% 100%, 0 75%, 50% 50%, 0 28%);
    }

    .shimenawa-shide.s1{ left:22%; top:50%; }
    .shimenawa-shide.s2{ left:48%; top:50%; }
    .shimenawa-shide.s3{ left:74%; top:50%; }

    .draw-overlay.show .shimenawa{
      animation: shimenawaSwing 2.8s ease-in-out infinite;
    }

    @keyframes shimenawaSwing {
      0%, 100% { transform: rotate(-1deg); }
      50% { transform: rotate(1deg); }
    }

    .draw-overlay.show .shimenawa{
      animation: shimenawaFade 1s ease 1.5s forwards;
    }

    @keyframes shimenawaFade {
      to { opacity: 0; transform: translateY(-30px); }
    }

    /* Falling capsule (huge, central) */
    .draw-capsule{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%) scale(0);
      width:200px;
      height:200px;
      pointer-events:none;
      z-index:5;
      filter:
        drop-shadow(0 18px 28px rgba(0,0,0,.7))
        drop-shadow(0 0 60px rgba(243,197,55,.4));
    }

    .draw-capsule .cap-top{
      position:absolute;
      left:0;
      right:0;
      top:0;
      height:50%;
      border-radius:50% 50% 0 0;
      background:
        radial-gradient(ellipse at 30% 25%, rgba(255,255,255,.65) 0 18%, transparent 35%),
        var(--cap-color, linear-gradient(180deg, #ff7e3a, var(--shrine-red)));
      border: 3px solid rgba(0,0,0,.45);
      border-bottom: 0;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.45),
        inset 0 -8px 16px rgba(0,0,0,.32);
    }

    .draw-capsule .cap-bottom{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:50%;
      border-radius:0 0 50% 50%;
      background:
        radial-gradient(ellipse at 70% 80%, rgba(255,255,255,.16) 0 14%, transparent 30%),
        var(--cap-color2, linear-gradient(180deg, var(--shrine-red), var(--shrine-red-deep)));
      border: 3px solid rgba(0,0,0,.45);
      border-top: 0;
      box-shadow:
        inset 0 8px 16px rgba(0,0,0,.32),
        inset 0 -2px 0 rgba(255,255,255,.16);
    }

    .draw-capsule .cap-band{
      position:absolute;
      left:-4px;
      right:-4px;
      top:48%;
      height:7%;
      background: linear-gradient(180deg, var(--shrine-gold) 0%, var(--shrine-gold-deep) 100%);
      border:2px solid rgba(0,0,0,.5);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.6),
        inset 0 -2px 0 rgba(0,0,0,.3);
    }

    .draw-capsule .cap-rank{
      position:absolute;
      left:0;
      right:0;
      top:30%;
      text-align:center;
      color:#fff;
      font-size:48px;
      font-weight:950;
      letter-spacing:.08em;
      text-shadow:
        0 2px 0 rgba(0,0,0,.6),
        0 0 18px rgba(255,255,255,.6);
      z-index:2;
    }

    .draw-overlay.show .draw-capsule{
      animation: capsuleArrival 2.6s cubic-bezier(.4, 1.5, .3, 1) 2.5s forwards;
    }

    @keyframes capsuleArrival {
      0% {
        transform: translate(-50%, -260%) scale(.5) rotate(-720deg);
        opacity: 0;
      }
      24% {
        transform: translate(-50%, -50%) scale(1.05) rotate(-12deg);
        opacity: 1;
      }
      32% {
        transform: translate(-50%, -50%) scale(.92) rotate(8deg);
      }
      42% {
        transform: translate(-50%, -50%) scale(1.05) rotate(-3deg);
      }
      52% {
        transform: translate(-50%, -50%) scale(1) rotate(0);
      }
      72% {
        transform: translate(-50%, -50%) scale(1) rotate(0);
      }
      100% {
        transform: translate(-50%, -50%) scale(1.6) rotate(0);
        opacity: 0;
      }
    }

    /* Capsule cracks open and reveals omikuji paper */
    .draw-overlay.show .draw-capsule.crack .cap-top{
      animation: capCrackOpenTop .9s cubic-bezier(.4,.1,.2,1) 4.5s forwards;
    }

    .draw-overlay.show .draw-capsule.crack .cap-bottom{
      animation: capCrackOpenBottom .9s cubic-bezier(.4,.1,.2,1) 4.5s forwards;
    }

    @keyframes capCrackOpenTop {
      0% { transform: translateY(0) rotate(0); }
      100% { transform: translateY(-160px) rotate(-22deg); opacity:0; }
    }

    @keyframes capCrackOpenBottom {
      0% { transform: translateY(0) rotate(0); }
      100% { transform: translateY(160px) rotate(18deg); opacity:0; }
    }

    /* Light burst when capsule opens */
    .light-burst{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%) scale(0);
      width:80px;
      height:80px;
      border-radius:50%;
      pointer-events:none;
      z-index:4;
      opacity:0;
      background:
        radial-gradient(circle at center,
          #fff 0 18%,
          var(--shrine-gold-light) 24% 48%,
          rgba(243,197,55,.4) 60% 80%,
          transparent 100%);
      mix-blend-mode: screen;
    }

    .draw-overlay.show .light-burst{
      animation: lightBurstFire 1.8s ease-out 4.6s forwards;
    }

    @keyframes lightBurstFire {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.2); }
      18% { opacity: 1; transform: translate(-50%, -50%) scale(2); }
      55% { opacity: .8; transform: translate(-50%, -50%) scale(8); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(14); }
    }

    /* Conic radiance for big rank reveal */
    .radiance{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%) scale(0);
      width:1000px;
      height:1000px;
      pointer-events:none;
      z-index:3;
      opacity:0;
      background: repeating-conic-gradient(
        from 0deg at 50% 50%,
        rgba(243,197,55,.0) 0deg 8deg,
        rgba(243,197,55,.6) 8deg 10deg,
        rgba(243,197,55,.0) 10deg 18deg
      );
      mix-blend-mode: screen;
      mask: radial-gradient(circle at center, transparent 0 8%, #000 25% 60%, transparent 90%);
      -webkit-mask: radial-gradient(circle at center, transparent 0 8%, #000 25% 60%, transparent 90%);
    }

    .draw-overlay.show .radiance{
      animation: radianceSpin 4s linear 4.4s forwards;
    }

    @keyframes radianceSpin {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.4) rotate(0); }
      14% { opacity: 1; transform: translate(-50%, -50%) scale(.8) rotate(60deg); }
      80% { opacity: .85; transform: translate(-50%, -50%) scale(1) rotate(360deg); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1) rotate(540deg); }
    }

    /* Omikuji paper that emerges from the cracked capsule */
    .draw-paper{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%) scale(0);
      width:min(82vw, 320px);
      pointer-events:none;
      z-index:6;
      opacity:0;
    }

    .draw-overlay.show .draw-paper{
      animation: paperReveal 1.2s cubic-bezier(.18,1.3,.22,1) 5s forwards;
    }

    @keyframes paperReveal {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.2) rotate(-12deg); }
      40% { opacity: 1; transform: translate(-50%, -50%) scale(1.08) rotate(2deg); }
      62% { transform: translate(-50%, -50%) scale(.96) rotate(-1deg); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0); }
    }

    .paper-card{
      position:relative;
      padding:18px 16px 18px;
      border-radius:8px;
      background:
        linear-gradient(180deg, var(--paper-cream) 0%, var(--paper-aged) 100%);
      border:3px solid var(--shrine-ink);
      box-shadow:
        inset 0 0 0 1px var(--shrine-ink),
        inset 0 0 0 4px var(--paper-cream),
        inset 0 0 0 5px var(--shrine-ink),
        0 18px 36px rgba(0,0,0,.6),
        0 0 50px rgba(243,197,55,.4);
      text-align:center;
      color: var(--shrine-ink);
    }

    .paper-card::before,
    .paper-card::after{
      content:"";
      position:absolute;
      width:24px;
      height:24px;
      background:
        radial-gradient(circle at 40% 40%, var(--shrine-gold) 0 30%, var(--shrine-gold-deep) 100%);
      border-radius:50%;
      border:2px solid var(--shrine-ink);
      box-shadow: 0 2px 4px rgba(0,0,0,.4);
    }

    .paper-card::before{ top:-12px; left:-12px; }
    .paper-card::after{ top:-12px; right:-12px; }

    .paper-card-rank{
      margin:8px 0 6px;
      font-size:clamp(40px, 12vw, 60px);
      font-weight:950;
      letter-spacing:.16em;
      line-height:1;
      color:transparent;
      background: linear-gradient(180deg, var(--shrine-red) 0%, var(--shrine-red-dark) 50%, var(--shrine-red-deep) 100%);
      -webkit-background-clip:text;
      background-clip:text;
      filter:drop-shadow(0 1px 0 rgba(255,255,255,.6));
    }

    .paper-card-rank.r-dai{
      background: linear-gradient(180deg, #fff5cc 0%, #ffd34a 30%, var(--shrine-red) 60%, var(--shrine-red-deep) 100%);
      -webkit-background-clip:text;
      background-clip:text;
    }

    .paper-card-tag{
      margin:0 0 10px;
      font-size:11px;
      font-weight:900;
      letter-spacing:.32em;
      color: var(--shrine-red-dark);
    }

    .paper-card-msg{
      margin:0;
      font-size:14px;
      line-height:1.85;
      font-weight:850;
      color:#3d2810;
    }

    /* Floating ofuda (golden shrine charms) for 大吉 */
    .ofuda-rain{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:7;
      overflow:hidden;
    }

    .ofuda{
      position:absolute;
      top:-80px;
      width:32px;
      height:48px;
      background:
        linear-gradient(180deg, #fff5cc 0%, #ffd34a 100%);
      border:1.5px solid var(--shrine-ink);
      border-radius:2px;
      box-shadow:
        inset 0 0 0 2px var(--shrine-red),
        0 4px 8px rgba(0,0,0,.4);
      opacity: 0;
      transform: rotate(0);
    }

    .ofuda::before{
      content:"";
      position:absolute;
      left:0; right:0;
      top:6px;
      height:5px;
      background: var(--shrine-red);
    }

    .ofuda::after{
      content:"";
      position:absolute;
      left:30%;
      right:30%;
      top:18px;
      bottom:6px;
      background:
        repeating-linear-gradient(0deg, var(--shrine-red) 0 1px, transparent 1px 5px);
      opacity:.6;
    }

    .ofuda.fall{
      animation: ofudaFall var(--dur, 4s) linear var(--delay, 0s) forwards;
    }

    @keyframes ofudaFall {
      0% { opacity: 0; transform: translate(0, -60px) rotate(0deg); }
      8% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: .2; transform: translate(var(--xshift, 0), 110vh) rotate(var(--rotEnd, 720deg)); }
    }

    /* Stuck/jammed effect for 末吉 */
    .draw-overlay.tier-sue .gasha-shudder{
      animation: jamShudder .5s ease-in-out infinite;
    }

    @keyframes jamShudder {
      0%, 100% { transform: translate(0,0); }
      30% { transform: translate(-3px, 1px); }
      60% { transform: translate(3px, -1px); }
    }

    .jam-spark{
      position:absolute;
      width:6px; height:6px;
      border-radius:50%;
      background: #ffea4a;
      box-shadow: 0 0 12px #ffea4a, 0 0 6px #fff;
      opacity:0;
    }

    /* Dragon silhouette for 大吉 mega */
    .dragon-shadow{
      position:absolute;
      left:50%;
      top:50%;
      transform: translate(-50%, -50%) scale(0);
      width:600px;
      height:600px;
      pointer-events:none;
      z-index:2;
      opacity:0;
    }

    .dragon-shadow svg{
      width:100%;
      height:100%;
      filter: drop-shadow(0 0 30px rgba(243,197,55,.7)) drop-shadow(0 0 80px rgba(255,80,40,.5));
    }

    .draw-overlay.tier-dai.show .dragon-shadow{
      animation: dragonRise 3s cubic-bezier(.18,1,.22,1) 4s forwards;
    }

    @keyframes dragonRise {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.2) rotate(-30deg); }
      30% { opacity: .7; transform: translate(-50%, -50%) scale(1) rotate(8deg); }
      70% { opacity: .8; transform: translate(-50%, -50%) scale(1.05) rotate(-4deg); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2) rotate(0); }
    }

    /* Wooden tag (low-tier result) — for 末吉 */
    .wooden-tag{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%) scale(0);
      width:min(72vw, 280px);
      pointer-events:none;
      z-index:6;
      opacity:0;
    }

    .draw-overlay.show .wooden-tag{
      animation: woodenDrop 1.4s cubic-bezier(.5,.05,.3,1.2) 5s forwards;
    }

    @keyframes woodenDrop {
      0% { opacity:0; transform: translate(-50%, -260%) scale(.7) rotate(-8deg); }
      40% { opacity:1; transform: translate(-50%, -50%) scale(1.05) rotate(2deg); }
      52% { transform: translate(-50%, -42%) scale(1) rotate(-3deg); }
      62% { transform: translate(-50%, -50%) scale(1) rotate(1deg); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0); }
    }

    .wooden-tag-card{
      position:relative;
      padding:18px 16px;
      border-radius:6px;
      background:
        linear-gradient(180deg,
          #c89a5e 0%,
          #8a6035 50%,
          #5b3e1e 100%);
      border:3px solid #3a2812;
      box-shadow:
        inset 0 2px 0 rgba(255,235,180,.3),
        inset 0 -3px 0 rgba(0,0,0,.4),
        0 14px 28px rgba(0,0,0,.55);
      text-align:center;
      color:#3a2812;
    }

    .wooden-tag-card::before{
      content:"";
      position:absolute;
      left:50%;
      top:-14px;
      transform:translateX(-50%);
      width:18px;
      height:18px;
      border-radius:50%;
      border:3px solid #3a2812;
      background: #5b3e1e;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.16);
    }

        capColor: "linear-gradient(180deg, #a4ddb1, #67c384)",
        capColor2: "linear-gradient(180deg, #67c384, #2f8d50)",
        helper: "ゆっくり進むといい日です。のんびり楽しみましょう。"
      },
      "末吉": {
        cls: "rank-sue",
        tier: "sue",
        capColor: "linear-gradient(180deg, #c0c8d0, #9aa5b0)",
        capColor2: "linear-gradient(180deg, #65707b, #353d47)",
        helper: "これからよくなる日です。あせらず自分のペースでいきましょう。"
      }
    };

    const reelRank = document.getElementById("reelRank");
    const reelType = document.getElementById("reelType");
    const gashaKnob = document.getElementById("gashaKnob");
    const gashapon = document.getElementById("gashapon");
    const resultCard = document.getElementById("resultCard");
    const drawOverlay = document.getElementById("drawOverlay");
    const drawCapsule = document.getElementById("drawCapsule");
    const drawPaper = document.getElementById("drawPaper");
    const woodenTag = document.getElementById("woodenTag");
    const ofudaRain = document.getElementById("ofudaRain");
    const trayLabel = document.getElementById("trayLabel");

    document.getElementById("topBackLink").href = STAMP_TOP_URL;
    document.getElementById("topHomeLink").href = STAMP_TOP_URL;

    let isDrawing = false;
    let lastResultId = null;

    gashaKnob.addEventListener("click", drawFortune);
    gashaKnob.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        drawFortune();
      }
    });

    function drawFortune() {
      if (isDrawing) return;
      isDrawing = true;

      resultCard.classList.remove("show");
      resultCard.innerHTML = "";

      gashapon.classList.add("drawing");
      reelRank.classList.remove("idle");

      // === Phase 1: gashapon machine shaking, display flickers (1.8s) ===
      const flickerDuration = 1800;
      const flickerInterval = 70;
      const flickerSteps = Math.floor(flickerDuration / flickerInterval);
      let count = 0;

      const flicker = setInterval(() => {
        const preview = FORTUNES[Math.floor(Math.random() * FORTUNES.length)];
        reelRank.textContent = preview.rank;
        reelType.textContent = preview.type;
        count++;

        if (count >= flickerSteps) {
          clearInterval(flicker);
          settleAndReveal();
        }
      }, flickerInterval);

      // small vibration during shake (mobile)
      vibrate([20, 30, 20, 30, 20, 30, 20]);
    }

    function settleAndReveal() {
      const picked = pickFortune();
      const meta = RANK_META[picked.rank] || RANK_META["中吉"];

      reelRank.textContent = picked.rank;
      reelType.textContent = picked.type;

      // brief settle pause
      setTimeout(() => {
        gashapon.classList.remove("drawing");
        runFullscreenCapsule(picked, meta);
      }, 250);
    }

    /**
     * The big show: torii gates open, capsule drops in, cracks open,
     * paper/wooden tag emerges, ofuda rain (大吉 only), dragon (大吉 only).
     */
    function runFullscreenCapsule(picked, meta) {
      // Reset overlay state
      drawOverlay.className = "draw-overlay tier-" + meta.tier;
      drawOverlay.setAttribute("aria-hidden", "false");
      ofudaRain.innerHTML = "";

      // Configure the capsule colors and rank text
      drawCapsule.style.setProperty("--cap-color", meta.capColor);
      drawCapsule.style.setProperty("--cap-color2", meta.capColor2);
      document.getElementById("capRank").textContent = picked.rank;

      // Configure the paper card (used for 小吉 and above)
      const paperRank = document.getElementById("paperRank");
      const paperTag = document.getElementById("paperTag");
      const paperMsg = document.getElementById("paperMsg");
      paperRank.className = "paper-card-rank " + (meta.tier === "dai" ? "r-dai" : "");
      paperRank.textContent = picked.rank;
      paperTag.textContent = picked.type === "指示系" ? "— ご神託（行動）—" : "— ご神託（言の葉）—";
      paperMsg.textContent = picked.text;

      // Configure wooden tag (used for 末吉)
      document.getElementById("woodenRank").textContent = picked.rank;
      document.getElementById("woodenTag2").textContent = picked.type === "指示系" ? "— 行動 —" : "— 言の葉 —";
      document.getElementById("woodenMsg").textContent = picked.text;

      requestAnimationFrame(() => {
        drawOverlay.classList.add("show");
        // Crack the capsule open after it lands
        setTimeout(() => {
          drawCapsule.classList.add("crack");
        }, 4400);
      });

      // Tier-specific extras
      if (meta.tier === "dai") {
        // 大吉: ofuda rain + dragon + heavy vibe
        setTimeout(() => spawnOfudaRain(50), 4600);
        setTimeout(() => spawnOfudaRain(30), 6200);
        setTimeout(() => vibrate([90, 40, 220, 60, 320]), 4600);
      } else if (meta.tier === "kichi") {
        // 吉: small ofuda flurry
        setTimeout(() => spawnOfudaRain(18), 4800);
        setTimeout(() => vibrate([60, 30, 140]), 4600);
      } else if (meta.tier === "chu") {
        // 中吉: minimal sparkle, blue light
        setTimeout(() => spawnOfudaRain(8), 4800);
        setTimeout(() => vibrate([45, 30, 90]), 4600);
      } else if (meta.tier === "sho") {
        // 小吉: very mild
        setTimeout(() => vibrate([35, 20, 55]), 4600);
      } else if (meta.tier === "sue") {
        // 末吉: jam shudder, sad wooden drop, no ofuda
        setTimeout(() => vibrate([20, 200, 20]), 4600);
      }

      // For 末吉, hide the paper and show the wooden tag instead
      if (meta.tier === "sue") {
        drawPaper.style.display = "none";
        woodenTag.style.display = "block";
      } else {
        drawPaper.style.display = "block";
        woodenTag.style.display = "none";
      }

      // After capsule lands and cracks, wire the close buttons
      // (no auto-close — user taps 受け取る to proceed)
      const closeDelay = 5800;
      setTimeout(() => {
        const paperClose = document.getElementById("paperClose");
        const woodenClose = document.getElementById("woodenClose");
        if (paperClose) paperClose.addEventListener("click", () => closeOverlayAndShowResult(picked, meta), { once: true });
        if (woodenClose) woodenClose.addEventListener("click", () => closeOverlayAndShowResult(picked, meta), { once: true });
      }, closeDelay);
    }

    function closeOverlayAndShowResult(picked, meta) {
      drawOverlay.classList.remove("show");
      drawOverlay.setAttribute("aria-hidden", "true");

      trayLabel.textContent = `ご神託：${picked.rank}（No.${picked.id}）`;
      trayLabel.style.color = "var(--shrine-gold)";

      renderResult(picked, meta);

      isDrawing = false;
    }

    function pickFortune() {
      if (FORTUNES.length === 1) return FORTUNES[0];
      let picked = FORTUNES[Math.floor(Math.random() * FORTUNES.length)];
      if (lastResultId !== null && FORTUNES.length > 1) {
        let safety = 0;
        while (picked.id === lastResultId && safety < 8) {
          picked = FORTUNES[Math.floor(Math.random() * FORTUNES.length)];
          safety++;
        }
      }
      lastResultId = picked.id;
      return picked;
    }

    function spawnOfudaRain(count) {
      for (let i = 0; i < count; i++) {
        const o = document.createElement("div");
        o.className = "ofuda fall";
        o.style.left = (Math.random() * 100) + "vw";
        o.style.setProperty("--dur", (Math.random() * 2.4 + 3.2) + "s");
        o.style.setProperty("--delay", (Math.random() * 0.6) + "s");
        o.style.setProperty("--xshift", (Math.random() * 120 - 60) + "px");
        o.style.setProperty("--rotEnd", (Math.random() * 720 - 360) + "deg");
        o.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;
        ofudaRain.appendChild(o);

        setTimeout(() => {
          if (o.parentNode) o.parentNode.removeChild(o);
        }, 7000);
      }
    }

    function renderResult(picked, meta) {
      const isDirective = picked.type === "指示系";

      resultCard.innerHTML = `
        <div class="result-head">
          <div class="rank-badge ${meta.cls}">${escapeHtml(picked.rank)}</div>
          <p class="result-no">No.${picked.id} / ${escapeHtml(picked.type)}</p>
        </div>

        <div class="result-body">
          <section class="message-card ${isDirective ? "directive" : ""}">
            <span class="message-type">${isDirective ? "やってみよう！" : "きょうのメッセージ"}</span>
            <p class="message-text">${escapeHtml(picked.text)}</p>
          </section>

          <div class="result-actions">
            <a class="btn btn-sub" href="${STAMP_TOP_URL}">スタンプラリーへ戻る</a>
          </div>
        </div>
      `;

      resultCard.classList.add("show");
      setTimeout(() => {
        resultCard.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 200);
    }

    function vibrate(pattern) {
      try { navigator.vibrate?.(pattern); } catch (e) {}
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
